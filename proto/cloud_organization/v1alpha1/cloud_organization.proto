// This file defines the CloudOrganization message and related types used to
// represent a cloud provider organization linked to a Cofide organization.

syntax = "proto3";

package proto.cloud_organization.v1alpha1;

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "proto/cloud_provider/v1alpha1/cloud_provider.proto";

option go_package = "github.com/cofide/cofide-api-sdk/gen/go/proto/cloud_organization/v1alpha1";

// DiscoveryStatus represents the current status of cloud resource discovery.
enum DiscoveryStatus {
  DISCOVERY_STATUS_UNSPECIFIED = 0;
  DISCOVERY_STATUS_DISCOVERING = 1;
  DISCOVERY_STATUS_ERROR = 2;
}

// AWSOrganization contains AWS-specific configuration for a cloud organization.
message AWSOrganization {
  // AWS Organization ID (e.g., o-xxxxxxxxxx).
  string aws_org_id = 1 [(google.api.field_behavior) = REQUIRED];
  reserved 2, 4;
  reserved "iam_role_arn", "external_id";
  // Audience value for the initial SPIFFE JWT-based assume role call.
  string audience = 3 [(google.api.field_behavior) = REQUIRED];
  // Ordered chain of IAM roles to assume. The first role is assumed via
  // AssumeRoleWithWebIdentity using the SPIFFE JWT; each subsequent role is
  // assumed using the credentials from the prior step.
  repeated proto.cloud_provider.v1alpha1.AssumeRoleConfig role_chain = 5 [(google.api.field_behavior) = REQUIRED];
}

// CloudOrganization represents a cloud provider organization linked to a Cofide organization.
message CloudOrganization {
  // Unique identifier for the cloud organization. Generated by the server, prefixed with "co-".
  string id = 1 [(google.api.field_behavior) = IDENTIFIER];
  // Cofide organization ID this cloud organization belongs to.
  string org_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];
  // Human-readable name for the cloud organization.
  string name = 3 [(google.api.field_behavior) = REQUIRED];
  // Cloud provider-specific configuration.
  oneof provider {
    AWSOrganization aws = 4;
  }
  // Whether discovery is enabled for this cloud organization.
  bool discovery_enabled = 5 [(google.api.field_behavior) = OPTIONAL];
  // Current discovery status.
  DiscoveryStatus status = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Timestamp of the last successful discovery.
  optional google.protobuf.Timestamp last_discovered_at = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Time of resource creation.
  google.protobuf.Timestamp created_at = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Time of last resource update.
  google.protobuf.Timestamp last_updated_at = 9 [(google.api.field_behavior) = OUTPUT_ONLY];
}
