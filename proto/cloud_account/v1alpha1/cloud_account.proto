// This file defines the CloudAccount message and related types used to
// represent a cloud provider account linked to a Cofide organization.

syntax = "proto3";

package proto.cloud_account.v1alpha1;

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "proto/cloud_organization/v1alpha1/cloud_organization.proto";

option go_package = "github.com/cofide/cofide-api-sdk/gen/go/proto/cloud_account/v1alpha1";

// AWSAccount contains AWS-specific configuration for a cloud account.
message AWSAccount {
  // 12-digit AWS account ID.
  string account_id = 1 [(google.api.field_behavior) = REQUIRED];
}

// LambdaDiscoveryConfig contains configuration for Lambda function discovery.
message LambdaDiscoveryConfig {
  // Placeholder for future tag filter fields.
}

// DiscoveryConfig contains configuration for discovering a specific type of cloud resource.
message DiscoveryConfig {
  // ARN of the IAM role used for cross-account access.
  string iam_role_arn = 1 [(google.api.field_behavior) = REQUIRED];
  // Audience value for the assume role call.
  string audience = 2 [(google.api.field_behavior) = REQUIRED];
  // Optional external ID for the assume role call.
  optional string external_id = 3 [(google.api.field_behavior) = OPTIONAL];
  // AWS regions to discover resources in.
  repeated string regions = 4 [(google.api.field_behavior) = OPTIONAL];
  // Whether discovery is enabled for this config.
  bool discovery_enabled = 5 [(google.api.field_behavior) = OPTIONAL];
  // Current discovery status.
  proto.cloud_organization.v1alpha1.DiscoveryStatus status = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Timestamp of the last successful discovery.
  optional google.protobuf.Timestamp last_discovered_at = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Timestamp of the last status update.
  optional google.protobuf.Timestamp status_last_updated_at = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Resource type-specific configuration.
  oneof resource_type {
    LambdaDiscoveryConfig lambda = 9;
  }
}

// CloudAccount represents a cloud provider account linked to a Cofide organization.
message CloudAccount {
  // Unique identifier for the cloud account. Generated by the server, prefixed with "ca-".
  string id = 1 [(google.api.field_behavior) = IDENTIFIER];
  // Cofide organization ID this cloud account belongs to.
  string org_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];
  // Optional cloud organization ID this account belongs to.
  optional string cloud_organization_id = 3 [(google.api.field_behavior) = OPTIONAL];
  // Human-readable name for the cloud account.
  string name = 4 [(google.api.field_behavior) = REQUIRED];
  // Cloud provider-specific configuration.
  oneof provider {
    AWSAccount aws = 5;
  }
  // Discovery configurations for different resource types.
  repeated DiscoveryConfig discovery_configs = 6 [(google.api.field_behavior) = OPTIONAL];
  // Time of resource creation.
  google.protobuf.Timestamp created_at = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Time of last resource update.
  google.protobuf.Timestamp last_updated_at = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
  // When true, discovery is suspended for this account and its resources are hidden from findings.
  bool suppressed = 9 [(google.api.field_behavior) = OPTIONAL];
}
