// This file defines the ClusterService gRPC service for managing clusters
// registered with the Connect control plane. Each cluster belongs to a trust
// zone.
syntax = "proto3";

package proto.connect.cluster_service.v1alpha1;

import "proto/cluster/v1alpha1/cluster.proto";

option go_package = "github.com/cofide/cofide-api-sdk/gen/go/proto/connect/cluster_service/v1alpha1";

// ClusterService manages clusters registered with the Connect control plane.
// Each cluster belongs to a trust zone.
service ClusterService {
  // CreateCluster registers a new cluster with the Connect control plane.
  rpc CreateCluster(CreateClusterRequest) returns (CreateClusterResponse);
  // DestroyCluster removes a cluster from the Connect control plane.
  rpc DestroyCluster(DestroyClusterRequest) returns (DestroyClusterResponse);
  // GetCluster retrieves a cluster by ID.
  rpc GetCluster(GetClusterRequest) returns (GetClusterResponse);
  // ListClusters returns all clusters matching the optional filter.
  rpc ListClusters(ListClustersRequest) returns (ListClustersResponse);
  // UpdateCluster updates the configuration of an existing cluster.
  rpc UpdateCluster(UpdateClusterRequest) returns (UpdateClusterResponse);
}

message CreateClusterRequest {
  optional proto.cluster.v1alpha1.Cluster cluster = 1;
}

message CreateClusterResponse {
  optional proto.cluster.v1alpha1.Cluster cluster = 1;
}

message DestroyClusterRequest {
  optional string cluster_id = 1;
}

message DestroyClusterResponse {}

message GetClusterRequest {
  optional string cluster_id = 1;
}

message GetClusterResponse {
  optional proto.cluster.v1alpha1.Cluster cluster = 1;
}

message ListClustersRequest {
  message Filter {
    optional string name = 1;
    optional string org_id = 2;
    optional string trust_zone_id = 3;
  }
  optional Filter filter = 1;
}

message ListClustersResponse {
  repeated proto.cluster.v1alpha1.Cluster clusters = 1;
}

message UpdateClusterRequest {
  optional proto.cluster.v1alpha1.Cluster cluster = 1;
}

message UpdateClusterResponse {
  optional proto.cluster.v1alpha1.Cluster cluster = 1;
}
