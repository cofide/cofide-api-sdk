// This file defines the IdentityService gRPC service, which provides read-only
// access to SPIFFE identities (SVIDs) issued by Connect. Identities are derived
// from attestation policy bindings and record the SPIFFE ID, attestation
// selectors, and federation configuration for each attested workload.
syntax = "proto3";

package proto.connect.identity_service.v1alpha1;

import "proto/identity/v1alpha1/identity.proto";

option go_package = "github.com/cofide/cofide-api-sdk/gen/go/proto/connect/identity_service/v1alpha1";

// IdentityService provides read-only access to the SPIFFE identities (SVIDs)
// issued by Connect to workloads on attested nodes. Identities are derived from
// attestation policy bindings and carry the SPIFFE ID, selectors, and federation
// configuration for each workload.
service IdentityService {
  // GetIdentity retrieves a SPIFFE identity by ID.
  rpc GetIdentity(GetIdentityRequest) returns (GetIdentityResponse);
  // ListIdentities returns all identities matching the optional filter.
  rpc ListIdentities(ListIdentitiesRequest) returns (ListIdentitiesResponse);
}

message GetIdentityRequest {
  string identity_id = 1;
}

message GetIdentityResponse {
  proto.identity.v1alpha1.Identity identity = 1;
}

message ListIdentitiesRequest {
  message Filter {
    optional string org_id = 1;
    optional string trust_zone_id = 2;
    optional string cluster_id = 3;
    optional string attestation_policy_id = 4;
    optional string ap_binding_id = 5;
    optional string workload_id = 6;
    optional string spiffe_id = 7;
  }
  optional Filter filter = 1;
}

message ListIdentitiesResponse {
  repeated proto.identity.v1alpha1.Identity identities = 1;
}
