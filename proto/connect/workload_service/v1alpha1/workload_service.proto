// This file defines the WorkloadService gRPC service for accessing workloads
// observed by Cofide Observers. Observers stream workload observations from
// the kubelet to the Connect control plane, where they are stored and matched
// against attestation policies for SPIFFE identity issuance.
syntax = "proto3";

package proto.connect.workload_service.v1alpha1;

import "google/api/field_behavior.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "proto/pagination/v1alpha1/pagination.proto";
import "proto/workload/v1alpha1/workload.proto";
import "proto/workload/v1alpha1/workload_event.proto";

option go_package = "github.com/cofide/cofide-api-sdk/gen/go/proto/connect/workload_service/v1alpha1";

// WorkloadService provides access to workloads observed by Cofide Observers.
// Observers stream workload observations from the kubelet to the Connect control
// plane, where they are stored and made available for query. Workloads can be
// matched against attestation policies to determine which SPIFFE identity to issue.
service WorkloadService {
  // ListWorkloads returns all workloads matching the optional filter.
  rpc ListWorkloads(ListWorkloadsRequest) returns (ListWorkloadsResponse);
  // PublishWorkloads is a client-streaming RPC used by Cofide Observers to report
  // observed workloads to the Connect control plane.
  rpc PublishWorkloads(stream PublishWorkloadsRequest) returns (PublishWorkloadsResponse);
  // ListWorkloadEvents returns workload events capturing SVID issuance outcomes,
  // matching the optional filter.
  rpc ListWorkloadEvents(ListWorkloadEventsRequest) returns (ListWorkloadEventsResponse);
  // PublishWorkloadEvents is a client-streaming RPC used by the SPIRE agent
  // exporter to deliver WorkloadEvent records to the Connect control plane.
  rpc PublishWorkloadEvents(stream PublishWorkloadEventsRequest) returns (PublishWorkloadEventsResponse);
}

message ListWorkloadsRequest {
  message Filter {
    optional string org_id = 3;
    optional string trust_zone_id = 1;
    optional string cluster_id = 2;
    // max_age filters workloads to those last observed within this duration.
    optional google.protobuf.Duration max_age = 4;
  }
  optional Filter filter = 1;
}

message ListWorkloadsResponse {
  repeated proto.workload.v1alpha1.Workload workloads = 1;
}

message PublishWorkloadsRequest {
  repeated proto.workload.v1alpha1.Workload workloads = 1;
}

message PublishWorkloadsResponse {}

message PublishWorkloadEventsRequest {
  repeated proto.workload.v1alpha1.WorkloadEvent events = 1 [(google.api.field_behavior) = REQUIRED];
}

message PublishWorkloadEventsResponse {}

message ListWorkloadEventsRequest {
  message Filter {
    string org_id = 1 [(google.api.field_behavior) = OPTIONAL];
    string trust_zone_id = 2 [(google.api.field_behavior) = OPTIONAL];
    string cluster_id = 3 [(google.api.field_behavior) = OPTIONAL];
    google.protobuf.Timestamp observed_before = 4 [(google.api.field_behavior) = OPTIONAL];
    google.protobuf.Timestamp observed_after = 5 [(google.api.field_behavior) = OPTIONAL];
    string spiffe_id = 6 [(google.api.field_behavior) = OPTIONAL];
    string entry_id = 7 [(google.api.field_behavior) = OPTIONAL];
    string agent_spiffe_id = 8 [(google.api.field_behavior) = OPTIONAL];
    repeated proto.workload.v1alpha1.WorkloadEventType event_types = 9 [(google.api.field_behavior) = OPTIONAL];
  }

  Filter filter = 1 [(google.api.field_behavior) = OPTIONAL];
  proto.pagination.v1alpha1.PageRequest pagination = 2 [(google.api.field_behavior) = OPTIONAL];
}

message ListWorkloadEventsResponse {
  repeated proto.workload.v1alpha1.WorkloadEvent events = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  proto.pagination.v1alpha1.PageResponse pagination = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
}
