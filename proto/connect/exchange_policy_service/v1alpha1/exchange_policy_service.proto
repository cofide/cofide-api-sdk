// This file defines the ExchangePolicyService gRPC service for managing
// exchange policies in the Connect control plane. Exchange policies govern
// Credex token exchanges within a trust zone by specifying match conditions
// on inbound tokens and determining whether exchanges are permitted or denied.

syntax = "proto3";

package proto.connect.exchange_policy_service.v1alpha1;

import "proto/exchange_policy/v1alpha1/exchange_policy.proto";

option go_package = "github.com/cofide/cofide-api-sdk/gen/go/proto/connect/exchange_policy_service/v1alpha1";

// ExchangePolicyService manages exchange policies that govern Credex token
// exchanges within a trust zone. Each policy defines conditions on the inbound
// token (subject, issuer, actor, client ID, target audience) and determines
// whether the exchange is allowed or denied.
service ExchangePolicyService {
  // CreateExchangePolicy creates a new exchange policy.
  rpc CreateExchangePolicy(CreateExchangePolicyRequest) returns (CreateExchangePolicyResponse);
  // DestroyExchangePolicy deletes an exchange policy by ID.
  rpc DestroyExchangePolicy(DestroyExchangePolicyRequest) returns (DestroyExchangePolicyResponse);
  // GetExchangePolicy retrieves an exchange policy by ID.
  rpc GetExchangePolicy(GetExchangePolicyRequest) returns (GetExchangePolicyResponse);
  // ListExchangePolicies returns all exchange policies matching the optional filter.
  rpc ListExchangePolicies(ListExchangePoliciesRequest) returns (ListExchangePoliciesResponse);
  // UpdateExchangePolicy updates an existing exchange policy. An optional update
  // mask specifies which fields to update; if omitted, a full replacement is made.
  rpc UpdateExchangePolicy(UpdateExchangePolicyRequest) returns (UpdateExchangePolicyResponse);
}

message CreateExchangePolicyRequest {
  optional proto.exchange_policy.v1alpha1.ExchangePolicy exchange_policy = 1;
}

message CreateExchangePolicyResponse {
  optional proto.exchange_policy.v1alpha1.ExchangePolicy exchange_policy = 1;
}

message DestroyExchangePolicyRequest {
  optional string exchange_policy_id = 1;
}

message DestroyExchangePolicyResponse {}

message GetExchangePolicyRequest {
  optional string exchange_policy_id = 1;
}

message GetExchangePolicyResponse {
  optional proto.exchange_policy.v1alpha1.ExchangePolicy exchange_policy = 1;
}

message ListExchangePoliciesRequest {
  message Filter {
    optional string name = 1;
    optional string org_id = 2;
    optional string trust_zone_id = 3;
  }
  optional Filter filter = 1;
}

message ListExchangePoliciesResponse {
  repeated proto.exchange_policy.v1alpha1.ExchangePolicy exchange_policies = 1;
}

message UpdateExchangePolicyRequest {
  optional proto.exchange_policy.v1alpha1.ExchangePolicy exchange_policy = 1;
}

message UpdateExchangePolicyResponse {
  optional proto.exchange_policy.v1alpha1.ExchangePolicy exchange_policy = 1;
}
