// This file defines the TrustZoneService gRPC service for managing trust zones
// and handling the registration of agents and SPIRE servers. Trust zones
// represent SPIFFE trust domains within the Connect platform; each has its own
// root of trust and can federate with other zones.
syntax = "proto3";

package proto.connect.trust_zone_service.v1alpha1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "proto/spire/api/types/bundle.proto";
import "proto/trust_zone/v1alpha1/trust_zone.proto";

option go_package = "github.com/cofide/cofide-api-sdk/gen/go/proto/connect/trust_zone_service/v1alpha1";

// TrustZoneService manages trust zones and handles the registration of agents
// and servers. Trust zones represent SPIFFE trust domains within the Connect
// platform; each zone has its own root of trust and can federate with other zones.
service TrustZoneService {
  // CreateTrustZone creates a new trust zone.
  rpc CreateTrustZone(CreateTrustZoneRequest) returns (CreateTrustZoneResponse) {}
  // DestroyTrustZone removes a trust zone by ID.
  rpc DestroyTrustZone(DestroyTrustZoneRequest) returns (DestroyTrustZoneResponse) {}
  // GetTrustZone retrieves a trust zone by ID.
  rpc GetTrustZone(GetTrustZoneRequest) returns (GetTrustZoneResponse) {}
  // ListTrustZones returns all trust zones matching the optional filter.
  rpc ListTrustZones(ListTrustZonesRequest) returns (ListTrustZonesResponse) {}
  // UpdateTrustZone updates the configuration of an existing trust zone.
  rpc UpdateTrustZone(UpdateTrustZoneRequest) returns (UpdateTrustZoneResponse) {}

  // RegisterAgent registers a Cofide Agent with its trust zone after it has
  // joined using a token from CreateAgentJoinToken. The agent provides its
  // SPIRE bundle for storage in the control plane.
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse) {}
  // RegisterTrustZoneServer registers the SPIRE server for a trust zone,
  // storing its bundle in the control plane.
  rpc RegisterTrustZoneServer(RegisterTrustZoneServerRequest) returns (RegisterTrustZoneServerResponse) {}
  // UpdateTrustZoneBundle updates the stored SPIRE trust bundle for a trust zone.
  // Called by Cofide SPIRE server or Cofide Agent when the SPIRE server rotates its bundle.
  rpc UpdateTrustZoneBundle(UpdateTrustZoneBundleRequest) returns (UpdateTrustZoneBundleResponse) {}
}

// Agent identifies a Cofide Agent during registration with the trust zone service.
message Agent {
  string agent_id = 1;
  string cluster_id = 2;
  string trust_zone_id = 3;
}

// TrustZoneServer identifies a SPIRE server by its cluster during registration.
// Deprecated: use trust_zone_server_id in RegisterTrustZoneServerRequest instead.
message TrustZoneServer {
  string cluster_id = 1;
}

message CreateTrustZoneRequest {
  proto.trust_zone.v1alpha1.TrustZone trust_zone = 1;
}

message CreateTrustZoneResponse {
  proto.trust_zone.v1alpha1.TrustZone trust_zone = 1;
}

message DestroyTrustZoneRequest {
  optional string trust_zone_id = 1;
}

message DestroyTrustZoneResponse {}

message GetTrustZoneRequest {
  optional string trust_zone_id = 1;
}

message GetTrustZoneResponse {
  optional proto.trust_zone.v1alpha1.TrustZone trust_zone = 1;
}

message ListTrustZonesRequest {
  message Filter {
    optional string name = 1;
    optional string org_id = 2;
    optional string trust_domain = 3;
  }
  optional Filter filter = 1;
}

message ListTrustZonesResponse {
  repeated proto.trust_zone.v1alpha1.TrustZone trust_zones = 1;
}

message UpdateTrustZoneRequest {
  proto.trust_zone.v1alpha1.TrustZone trust_zone = 1;
}

message UpdateTrustZoneResponse {
  proto.trust_zone.v1alpha1.TrustZone trust_zone = 1;
}

message RegisterAgentRequest {
  Agent agent = 1;
  string agent_token = 2;
  spire.api.types.Bundle bundle = 3;
}

message RegisterAgentResponse {
  string agent_id = 3;
}

message RegisterTrustZoneServerRequest {
  // To be deprecated, registration of a trust zone server by just specifying the cluster ID
  // Consumers should provide a trust zone server ID instead
  TrustZoneServer trust_zone_server = 1;
  spire.api.types.Bundle bundle = 2;
  string trust_zone_server_id = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference).type = "proto.trust_zone_server.v1alpha1/TrustZoneServer"
  ];
}

message RegisterTrustZoneServerResponse {
  // Empty for the moment
}

message UpdateTrustZoneBundleRequest {
  spire.api.types.Bundle bundle = 1;
  string trust_zone_id = 2;
}

message UpdateTrustZoneBundleResponse {}
