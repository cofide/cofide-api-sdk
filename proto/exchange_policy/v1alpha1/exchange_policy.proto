// This file defines the ExchangePolicy message and related types used to
// control Credex token exchanges within a trust zone. Exchange policies specify
// match conditions on inbound tokens and determine whether the exchange is
// permitted or denied.

syntax = "proto3";

package proto.exchange_policy.v1alpha1;

import "google/api/field_behavior.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/cofide/cofide-api-sdk/gen/go/proto/exchange_policy/v1alpha1";

// ExchangePolicy defines a rule for permitting or denying Credex token exchanges
// within a trust zone
message ExchangePolicy {
  // The unique ID of the exchange policy. Generated by the server.
  string id = 1 [(google.api.field_behavior) = IDENTIFIER];
  // Organization to which the exchange policy belongs. Derived from the trust zone by the API service.
  string org_id = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.field_behavior) = IMMUTABLE
  ];
  string name = 3 [(google.api.field_behavior) = REQUIRED];
  // Trust zone to which this policy applies. Immutable after creation.
  string trust_zone_id = 4 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];

  // Action to take when all conditions match. Defaults to ALLOW when unset.
  optional ExchangePolicyAction action = 5 [(google.api.field_behavior) = OPTIONAL];

  // Match conditions on the inbound subject token
  StringSet subject_identity = 6 [(google.api.field_behavior) = OPTIONAL];
  StringSet subject_issuer = 7 [(google.api.field_behavior) = OPTIONAL];
  // Match condition on the audience of the inbound subject token.
  // Useful for OIDC ID tokens which use the IdP's ID for the client.
  StringSet subject_audience = 15 [(google.api.field_behavior) = OPTIONAL];

  // Match conditions on the optional inbound actor
  StringSet actor_identity = 8 [(google.api.field_behavior) = OPTIONAL];
  StringSet actor_issuer = 9 [(google.api.field_behavior) = OPTIONAL];

  // Match condition on the OAuth client_id presenting the exchange request
  StringSet client_id = 10 [(google.api.field_behavior) = OPTIONAL];

  // Match condition on the requested target audience
  StringSet target_audience = 11 [(google.api.field_behavior) = OPTIONAL];

  // Outbound identity to set on the exchanged token. Only relevant when action is ALLOW.
  string outbound_identity = 16 [(google.api.field_behavior) = OPTIONAL];
  // Outbound scopes to grant. Only relevant when action is ALLOW.
  repeated string outbound_scopes = 12 [(google.api.field_behavior) = OPTIONAL];
  // Outbound OAuth Authorization Server (AS) to use. Only relevant when action
  // is ALLOW.
  // If set, requests matching this policy will cause Credex to perform an
  // OAuth flow against the specified AS and return the resulting token, rather
  // than minting one locally.
  OutboundOAuthAS outbound_oauth_as = 18 [(google.api.field_behavior) = OPTIONAL];

  // Time of resource creation by user.
  google.protobuf.Timestamp created_at = 13 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Time of last resource update by user.
  google.protobuf.Timestamp last_updated_at = 14 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Post-matching hooks that transform outbound token claims before Credex mints them.
  repeated ExternalHook external_hooks = 17 [(google.api.field_behavior) = OPTIONAL];
}

// ExchangePolicyAction determines whether a Credex token exchange is permitted
// when all conditions of an ExchangePolicy match.
enum ExchangePolicyAction {
  EXCHANGE_POLICY_ACTION_UNSPECIFIED = 0; // treated as ALLOW
  EXCHANGE_POLICY_ACTION_ALLOW = 1;
  EXCHANGE_POLICY_ACTION_DENY = 2;
}

message StringMatcher {
  oneof match {
    // Exact string equality.
    string exact = 1;
    // Glob pattern (e.g. spiffe://trust.domain/ns/*/sa/*).
    string glob = 2;
  }
}

// StringSet holds a collection of StringMatchers evaluated with OR semantics.
message StringSet {
  repeated StringMatcher matchers = 1;
}

// Outbound OAuth Authorization Server (AS) definition.
message OutboundOAuthAS {
  // OAuth grant type to use. Currently "client_credentials" is supported.
  string grant_type = 1 [(google.api.field_behavior) = REQUIRED];
  // Issuer URL for the AS. At least one of issuer_url and token_url must be
  // specified.
  string issuer_url = 2 [(google.api.field_behavior) = OPTIONAL];
  // Token URL for the AS. At least one of issuer_url and token_url must be
  // specified. If token_url is not specified, Credex will use RFC 8414 OAuth
  // AS metadata or OIDC Discovery to determine the token URL.
  string token_url = 3 [(google.api.field_behavior) = OPTIONAL];
  // Audiences to use in the request. If absent, the token URL will be used as
  // the audience.
  repeated string audiences = 4 [(google.api.field_behavior) = OPTIONAL];
}

// ExternalHook defines an HTTP endpoint that Credex calls after an exchange policy
// matches, allowing the hook to inspect and modify the outbound token claims before
// the token is minted. Hooks are invoked in the order they appear in the policy.
// If any hook returns an error or times out, the exchange is denied.
message ExternalHook {
  // Unique name for this hook within the policy. Used to identify the hook in logs.
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  // Human-readable description of the hook's purpose.
  string description = 2 [(google.api.field_behavior) = OPTIONAL];
  // The HTTPS URL of the external hook service. Credex will POST the inbound
  // subject/actor claims and the outbound token claims to this URL and expect a
  // JSON patch to apply to the outbound claims in return.
  // TODO: link to API definition of request/response format.
  string url = 3 [(google.api.field_behavior) = REQUIRED];
  // Authentication method used when calling the hook endpoint.
  oneof auth {
    // Authenticate to the hook using SPIFFE mTLS. Credex will present its SVID
    // and verify the hook's certificate against the specified SPIFFE ID.
    SpiffeMtlsAuth spiffe_mtls = 4 [(google.api.field_behavior) = REQUIRED];
  }
  // Maximum time to wait for the hook to respond. Defaults to a server-defined
  // value when unset. If the hook does not respond within this duration, the
  // exchange is denied.
  google.protobuf.Duration timeout = 5 [(google.api.field_behavior) = OPTIONAL];
}

// SpiffeMtlsAuth configures SPIFFE mTLS authentication for an ExternalHook.
message SpiffeMtlsAuth {
  // The SPIFFE ID of the hook service. Credex verifies that the hook's TLS
  // certificate encodes this SPIFFE ID before sending any data.
  string spiffe_id = 1 [(google.api.field_behavior) = REQUIRED];
}
