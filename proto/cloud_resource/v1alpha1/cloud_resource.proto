// This file defines the CloudResource message and related types used to
// represent a discovered cloud provider resource.

syntax = "proto3";

package proto.cloud_resource.v1alpha1;

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/cofide/cofide-api-sdk/gen/go/proto/cloud_resource/v1alpha1";

// LambdaFunction contains details of an AWS Lambda function.
message LambdaFunction {
  // Name of the Lambda function.
  string function_name = 1 [(google.api.field_behavior) = REQUIRED];
  // ARN of the Lambda function.
  string function_arn = 2 [(google.api.field_behavior) = REQUIRED];
  // AWS region where the function is deployed.
  string region = 3 [(google.api.field_behavior) = REQUIRED];
  // Runtime environment of the Lambda function.
  string runtime = 4 [(google.api.field_behavior) = OPTIONAL];
  // ARN of the IAM role associated with the function.
  string iam_role_arn = 5 [(google.api.field_behavior) = OPTIONAL];
  // Timestamp of the last modification.
  google.protobuf.Timestamp last_modified = 6 [(google.api.field_behavior) = OPTIONAL];
  // Optional description of the Lambda function.
  optional string description = 7 [(google.api.field_behavior) = OPTIONAL];
}

// EKSCluster contains details of an AWS EKS cluster.
message EKSCluster {
  // Name of the EKS cluster.
  string cluster_name = 1 [(google.api.field_behavior) = REQUIRED];
  // ARN of the EKS cluster.
  string cluster_arn = 2 [(google.api.field_behavior) = REQUIRED];
  // AWS region where the cluster is deployed.
  string region = 3 [(google.api.field_behavior) = REQUIRED];
  // Kubernetes version running on the cluster.
  string kubernetes_version = 4 [(google.api.field_behavior) = OPTIONAL];
  // OIDC provider URL for the cluster, used for workload identity (IRSA).
  string oidc_provider_url = 5 [(google.api.field_behavior) = OPTIONAL];
}

// AgentcoreWorkload contains details of an Amazon Bedrock AgentCore Runtime.
message AgentcoreWorkload {
  // Name of the AgentCore Runtime.
  string agent_runtime_name = 1 [(google.api.field_behavior) = REQUIRED];
  // ARN of the AgentCore Runtime.
  string agent_runtime_arn = 2 [(google.api.field_behavior) = REQUIRED];
  // Unique identifier of the AgentCore Runtime.
  string agent_runtime_id = 3 [(google.api.field_behavior) = REQUIRED];
  // AWS region where the runtime is deployed.
  string region = 4 [(google.api.field_behavior) = REQUIRED];
  // ARN of the IAM role used by the runtime at execution time.
  string role_arn = 5 [(google.api.field_behavior) = OPTIONAL];
  // Timestamp of the last update to the runtime.
  google.protobuf.Timestamp last_updated_at = 6 [(google.api.field_behavior) = OPTIONAL];
  // Optional description of the runtime.
  optional string description = 7 [(google.api.field_behavior) = OPTIONAL];
  // Current status of the runtime (e.g. READY, CREATING, UPDATING).
  optional string status = 8 [(google.api.field_behavior) = OPTIONAL];
}

// CloudResourceType identifies the type of a discovered cloud resource.
enum CloudResourceType {
  CLOUD_RESOURCE_TYPE_UNSPECIFIED = 0;
  CLOUD_RESOURCE_TYPE_LAMBDA_FUNCTION = 1;
  CLOUD_RESOURCE_TYPE_EKS_CLUSTER = 2;
  CLOUD_RESOURCE_TYPE_AGENTCORE_WORKLOAD = 3;
}

// CloudResource represents a discovered cloud provider resource.
message CloudResource {
  // Unique identifier for the cloud resource. Generated by the server, prefixed with "cr-".
  string id = 1 [(google.api.field_behavior) = IDENTIFIER];
  // Cofide organization ID this cloud resource belongs to.
  string org_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];
  // Cloud account ID this resource belongs to.
  string cloud_account_id = 3 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];
  // Resource type-specific details.
  oneof resource {
    LambdaFunction lambda_function = 4;
    EKSCluster eks_cluster = 8;
    AgentcoreWorkload agentcore_workload = 9;
  }
  // Time of resource creation.
  google.protobuf.Timestamp created_at = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Time of last resource update.
  google.protobuf.Timestamp last_updated_at = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
  // When true, this resource is hidden from findings.
  bool suppressed = 7 [(google.api.field_behavior) = OPTIONAL];
}
